name: PR Checks

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  verify:
    name: TypeScript + ESLint + Expo Doctor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx expo lint

      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true
