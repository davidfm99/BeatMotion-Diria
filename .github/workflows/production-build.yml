name: Production Build (main → App Store + Google Play)

on:
  push:
    branches:
      - main

jobs:
  build-production:
    name: EAS Build Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS Production
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android Production
        run: eas build --platform android --profile production --non-interactive

      - name: Submit iOS to App Store
        run: eas submit --platform ios --profile production --non-interactive

      - name: Submit Android to Google Play
        run: eas submit --platform android --profile production --non-interactive
